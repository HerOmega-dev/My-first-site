<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Blog</title>
</head>
<body>
    <main>
        <header>
            <nav>
                <ul>
                    <li><a href="">Your ideas</a></li>
                    <li><a href="">Sign in</a></li>
                    <li><a href="">Sign up</a></li>
                </ul>
            </nav>
            <div id="titles">
                <h1>Doctor who</h1>
                <h2>The Big Wiki</h2>
            </div>
        </header>
        <section class="eras">
            <article>
                <img id="test" src="./assets/images/logo_classic_1.1.jpg" alt="Logo-classic-era" width="300" height="300">
                <p>classic</p>
            </article>
            <article>
                <img id="new" src="./assets/images/logo_new_1.1.png" alt="Logo-new-era" width="300" height="300">
                <p>new</p>
            </article>
            <article>
                <img src="./assets/images/logo_new_disney_1.1.jpg" alt="Logo-disney-era" width="300" height="300">
                <p>disney</p>
            </article>
        </section>
        <section class="anim">
            <div class="flex">
                <div class="box">
                    <div class="faces" id="front">
                        <img class="tardis" src="./assets/images/tardis_transp.png" alt="tardis">
                    </div>
                    <div class="faces" id="right">
                        <img class="tardis" src="./assets/images/tardis_transp.png" alt="tardis">
                    </div>
                    <div class="faces" id="back">
                        <img class="tardis" src="./assets/images/tardis_transp.png" alt="tardis">
                    </div>
                    <div class="faces" id="left">
                        <img class="tardis" src="./assets/images/tardis_transp.png" alt="tardis">
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
